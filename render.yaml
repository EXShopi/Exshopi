services:
  - type: web
    name: exshopi-api
    runtime: node
    plan: starter
    rootDir: .
    buildCommand: npm install && npx prisma migrate deploy && npm run build:api
    startCommand: node dist/backend/server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: PORT
        value: 10000
      - key: USE_PRISMA_RUNTIME
        value: "true"
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_PUBLISHABLE_KEY
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: ACCESS_TOKEN_TTL
        value: 15m
      - key: REFRESH_TOKEN_TTL
        value: 7d
      - key: APP_URL
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: SEED_INITIAL_PASSWORD
        sync: false

  - type: static
    name: exshopi-frontend
    env: static
    branch: main
    rootDir: .
    buildCommand: npm install && npm run build:frontend
    publishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://exshopi-api.onrender.com
