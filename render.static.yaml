services:
  - type: static
    name: exshopi-frontend
    env: static
    branch: main
    buildCommand: npm install && npm run build:frontend
    publishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://exshopi-api.onrender.com
    # Optional: set the root dir if your frontend is in a subfolder
    # rootDir: .
