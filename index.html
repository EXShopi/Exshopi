<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Shop electronics, mobiles, refurbished laptops, accessories and more in the UAE on ExShopi. Trusted sellers, fast delivery, and cash on delivery." />
    <meta name="keywords" content="online shopping UAE, electronics UAE, mobiles, laptops, COD, cash on delivery, fast delivery, trusted sellers" />
    <meta name="theme-color" content="#000000" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://exshopi.com/" />
    <meta property="og:title" content="ExShopi UAE | Online Shopping for Electronics, Mobiles, Laptops & More" />
    <meta property="og:description" content="Shop electronics, mobiles, refurbished laptops, accessories and more in the UAE on ExShopi. Trusted sellers, fast delivery, and cash on delivery." />
    <meta property="og:image" content="https://exshopi.com/logo.png" />
    
    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://exshopi.com/" />
    <meta property="twitter:title" content="ExShopi UAE | Online Shopping for Electronics, Mobiles, Laptops & More" />
    <meta property="twitter:description" content="Shop electronics, mobiles, refurbished laptops, accessories and more in the UAE on ExShopi. Trusted sellers, fast delivery, and cash on delivery." />
    <meta property="twitter:image" content="https://exshopi.com/logo.png" />
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />
    
    <!-- Canonical URL -->
    <link rel="canonical" href="https://exshopi.com/" />
    
    <!-- Preconnect to improve performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    
    <title>ExShopi UAE | Online Shopping for Electronics, Mobiles, Laptops & More</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
        background: #f6f7f9;
      }
      #root {
        min-height: 100vh;
      }
      #loading {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        font-size: 18px;
        color: #666;
      }
      #error {
        display: none;
        padding: 20px;
        margin: 20px;
        background: #fee;
        border: 1px solid #fcc;
        border-radius: 8px;
        color: #c00;
        font-family: monospace;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="loading">Loading ExShopi...</div>
      <div id="error"></div>
    </div>
    <script>
      window.addEventListener('error', function(event) {
        const errorDiv = document.getElementById('error');
        errorDiv.style.display = 'block';
        errorDiv.innerHTML = `<strong>Error:</strong><br>${event.message}<br><br><pre>${event.filename}:${event.lineno}</pre>`;
      });
      
      // Remove loading message after app mounts
      setTimeout(function() {
        const loading = document.getElementById('loading');
        if (loading && loading.parentElement) {
          if (document.getElementById('root').childElementCount > 1) {
            loading.remove();
          }
        }
      }, 2000);
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
