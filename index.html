    <meta property="og:image" content="https://exshopi.com/logo.png" />
    
    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://exshopi.com/" />
    <meta property="twitter:title" content="ExShopi UAE | Online Shopping for Electronics, Mobiles, Laptops & More" />
    <meta property="twitter:description" content="Shop electronics, mobiles, refurbished laptops, accessories and more in the UAE on ExShopi. Trusted sellers, fast delivery, and cash on delivery." />
    <meta property="twitter:image" content="https://exshopi.com/logo.png" />
    
    <!-- Favicon - Versioned to avoid browser cache issues -->
    <!-- Standard favicon for browsers -->
    <link rel="icon" type="image/x-icon" href="/favicon-v2.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32-v2.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16-v2.png" />
    
    <!-- Apple Touch Icon (iOS home screen) -->
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon-v2.png" />
    
    <!-- Android Chrome & PWA -->
    <link rel="icon" type="image/png" sizes="192x192" href="/favicon-192x192-v2.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/favicon-512x512-v2.png" />
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/site.webmanifest" />
    
    <!-- Microsoft Tiles -->
    <meta name="msapplication-TileImage" content="/favicon-32x32-v2.png" />
    <meta name="msapplication-TileColor" content="#000000" />
    
    <!-- Canonical URL -->
    <link rel="canonical" href="https://exshopi.com/" />
    
    <!-- Preconnect to improve performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    
    <!-- Load fonts asynchronously to prevent render blocking -->
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" media="print" onload="this.media='all'" />
    
    <title>ExShopi UAE | Online Shopping for Electronics, Mobiles, Laptops & More</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
        background: #f6f7f9;
      }
      #root {
        min-height: 100vh;
      }
      #loading {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        font-size: 18px;
        color: #666;
      }
      #error {
        display: none;
        padding: 20px;
        margin: 20px;
        background: #fee;
        border: 1px solid #fcc;
        border-radius: 8px;
        color: #c00;
        font-family: monospace;
      }
    </style>
    
    <!-- Preload critical LCP image for better performance (WebP preferred) -->
    <link rel="preload" as="image" href="/hero/hero-1.webp" type="image/webp" fetchpriority="high" />
    
    <!-- DNS Prefetch for external services to improve connection speed -->
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://www.googletagmanager.com" />
    <link rel="dns-prefetch" href="https://www.google-analytics.com" />
    <link rel="dns-prefetch" href="https://cdn.cloudinary.com" />
    <link rel="dns-prefetch" href="https://www.stripe.com" />
  </head>
  <body>
    <div id="root">
      <div id="loading">Loading ExShopi...</div>
      <div id="error"></div>
    </div>
    <script>
      window.addEventListener('error', function(event) {
        const errorDiv = document.getElementById('error');
        errorDiv.style.display = 'block';
        errorDiv.innerHTML = `<strong>Error:</strong><br>${event.message}<br><br><pre>${event.filename}:${event.lineno}</pre>`;
      });
      
      // Remove loading message after app mounts
      setTimeout(function() {
        const loading = document.getElementById('loading');
        if (loading && loading.parentElement) {
          if (document.getElementById('root').childElementCount > 1) {
            loading.remove();
          }
        }
      }, 2000);
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
