  <body>
    <div id="root">
      <div id="loading">Loading ExShopi...</div>
      <div id="error"></div>
    </div>

    <script>
      window.addEventListener("error", function (event) {
        const errorDiv = document.getElementById("error");
        if (!errorDiv) return;

        errorDiv.style.display = "block";
        errorDiv.innerHTML = `<strong>Error:</strong><br>${event.message}<br><br><pre>${event.filename}:${event.lineno}</pre>`;
      });

      setTimeout(function () {
        const loading = document.getElementById("loading");
        const root = document.getElementById("root");

        if (loading && root && root.childElementCount > 1) {
          loading.remove();
        }
      }, 2000);

      setTimeout(function () {
        try {
          const loading = document.getElementById("loading");
          if (loading && loading.parentElement) loading.remove();
        } catch (e) {}
      }, 5000);
    </script>
