<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ExShopi - Premium Marketplace</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
        background: #f6f7f9;
      }
      #root {
        min-height: 100vh;
      }
      #loading {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        font-size: 18px;
        color: #666;
      }
      #error {
        display: none;
        padding: 20px;
        margin: 20px;
        background: #fee;
        border: 1px solid #fcc;
        border-radius: 8px;
        color: #c00;
        font-family: monospace;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="loading">Loading ExShopi...</div>
      <div id="error"></div>
    </div>
    <script>
      window.addEventListener('error', function(event) {
        const errorDiv = document.getElementById('error');
        errorDiv.style.display = 'block';
        errorDiv.innerHTML = `<strong>Error:</strong><br>${event.message}<br><br><pre>${event.filename}:${event.lineno}</pre>`;
      });
      
      // Remove loading message after app mounts
      setTimeout(function() {
        const loading = document.getElementById('loading');
        if (loading && loading.parentElement) {
          if (document.getElementById('root').childElementCount > 1) {
            loading.remove();
          }
        }
      }, 2000);
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
